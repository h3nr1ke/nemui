name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/landing/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build
        run: |
          cd packages/landing
          npm ci
          npm run build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la packages/landing/dist/
          echo "---"
          cat packages/landing/dist/index.html | head -5

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/landing/dist
          force_orphan: true
